name: 每日数据更新

on:
  schedule:
    - cron: '45 22 * * *'   # 22:45 UTC = 次日 06:45 新加坡时间(美股已收盘)
  workflow_dispatch: {}      # 支持在 Actions 页面手动触发
  push:
    branches: [main]
    paths: ['scripts/**', 'config.json', '.github/workflows/**']

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: 抓取数据(纯标准库,无依赖)
        run: python3 scripts/update_data.py

      - name: 提交并推送
        run: |
          git config user.name 'data-bot'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --cached --quiet; then
            echo '数据无变化,跳过提交'
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC 自动更新"
            git push
          fi
